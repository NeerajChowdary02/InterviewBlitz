# Server
server.port=8080

# PostgreSQL database connection — env vars injected by Docker, defaults for local dev
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:interviewblitz}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — auto-create/update schema from entities in development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson — serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# LeetCode session credentials — set via environment variables, never hardcoded
leetcode.session=${LEETCODE_SESSION:}
leetcode.csrftoken=${LEETCODE_CSRF:}

# OpenAI API key — set via environment variable, never hardcoded
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# Logging
logging.level.com.interviewblitz=DEBUG
