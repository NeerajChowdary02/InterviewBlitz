# Server
server.port=8080

# PostgreSQL database connection
spring.datasource.url=jdbc:postgresql://localhost:5432/interviewblitz
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate — auto-create/update schema from entities in development
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Jackson — serialize dates as ISO strings, not timestamps
spring.jackson.serialization.write-dates-as-timestamps=false

# OpenAI API key — set via environment variable, never hardcoded
openai.api.key=${OPENAI_API_KEY:}
openai.model=gpt-4o-mini

# Logging
logging.level.com.interviewblitz=DEBUG
