<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a1a2e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="IBlitz" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <title>InterviewBlitz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1a1a2e;
      --card:     #0f3460;
      --accent:   #16c79a;
      --wrong:    #e74c3c;
      --text:     #e2e2e2;
      --muted:    #8892a4;
      --border:   #1e4d80;
      --tap:      48px;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 16px;
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    #app {
      max-width: 640px;
      margin: 0 auto;
      min-height: 100%;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 16px);
    }

    /* ── Screens ── */
    .screen { display: none; padding: 16px; }
    .screen.active { display: block; }

    /* ── Header ── */
    .app-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 16px 8px;
      border-bottom: 1px solid var(--border);
    }
    .app-title {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }
    .nav-tabs {
      display: flex;
      gap: 4px;
    }
    .nav-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 0.85rem;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      cursor: pointer;
      min-height: var(--tap);
      min-width: var(--tap);
      transition: background 0.15s, color 0.15s;
    }
    .nav-btn.active, .nav-btn:hover {
      color: var(--accent);
      background: rgba(22,199,154,0.1);
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .stat-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      line-height: 1.1;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Buttons ── */
    .btn {
      display: block;
      width: 100%;
      min-height: var(--tap);
      padding: 14px 20px;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      text-align: center;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #0d0d1a; }
    .btn-secondary {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Problem header ── */
    .problem-header { margin-bottom: 20px; }
    .problem-number {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    .problem-title {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .difficulty-badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .difficulty-Easy   { background: rgba(22,199,154,0.15); color: var(--accent); }
    .difficulty-Medium { background: rgba(255,167,38,0.15); color: #ffa726; }
    .difficulty-Hard   { background: rgba(231,76,60,0.15); color: var(--wrong); }

    /* ── Quiz progress ── */
    .quiz-progress {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .progress-bar {
      flex: 1;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      margin: 0 12px;
    }
    .progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .progress-label {
      font-size: 0.8rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── Question type badge ── */
    .question-type {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 10px;
    }

    /* ── Question text ── */
    .question-text {
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 20px;
      color: var(--text);
    }

    /* ── Answer options ── */
    .options-list { display: flex; flex-direction: column; gap: 10px; }
    .option-btn {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      width: 100%;
      min-height: var(--tap);
      padding: 14px 16px;
      background: rgba(255,255,255,0.04);
      border: 2px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 0.95rem;
      line-height: 1.4;
      text-align: left;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
    }
    .option-btn:hover:not(:disabled) {
      border-color: var(--accent);
      background: rgba(22,199,154,0.07);
    }
    .option-btn:disabled { cursor: default; }
    .option-label {
      font-weight: 700;
      font-size: 0.9rem;
      color: var(--accent);
      flex-shrink: 0;
      min-width: 22px;
    }
    .option-btn.correct {
      border-color: var(--accent);
      background: rgba(22,199,154,0.12);
    }
    .option-btn.correct .option-label { color: var(--accent); }
    .option-btn.wrong {
      border-color: var(--wrong);
      background: rgba(231,76,60,0.1);
    }
    .option-btn.wrong .option-label { color: var(--wrong); }

    /* ── Explanation ── */
    .explanation-box {
      margin-top: 16px;
      padding: 14px 16px;
      background: rgba(22,199,154,0.07);
      border-left: 3px solid var(--accent);
      border-radius: 0 10px 10px 0;
      font-size: 0.9rem;
      line-height: 1.6;
      color: var(--text);
    }
    .explanation-box strong {
      display: block;
      margin-bottom: 6px;
      color: var(--accent);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── Summary ── */
    .summary-score {
      font-size: 3.5rem;
      font-weight: 700;
      text-align: center;
      color: var(--accent);
      line-height: 1;
      margin: 16px 0 8px;
    }
    .summary-label {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 20px;
    }
    .leetcode-link {
      display: block;
      text-align: center;
      color: var(--accent);
      font-size: 0.9rem;
      margin-bottom: 20px;
      text-decoration: none;
    }
    .leetcode-link:hover { text-decoration: underline; }

    /* ── Topic stats ── */
    .topic-row { margin-bottom: 14px; }
    .topic-row-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 5px;
    }
    .topic-name {
      font-size: 0.9rem;
      font-weight: 600;
      text-transform: capitalize;
    }
    .topic-pct {
      font-size: 0.82rem;
      color: var(--muted);
    }
    .topic-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      overflow: hidden;
    }
    .topic-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    /* ── Weak areas tag ── */
    .weak-tag {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--wrong);
      background: rgba(231,76,60,0.12);
      border-radius: 6px;
      padding: 2px 7px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* ── Spinner ── */
    .spinner-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 20px;
      gap: 16px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { color: var(--muted); font-size: 0.9rem; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom, 0px) + 20px);
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1e3a5f;
      color: var(--text);
      font-size: 0.88rem;
      padding: 10px 20px;
      border-radius: 24px;
      border: 1px solid var(--border);
      white-space: nowrap;
      z-index: 999;
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
      pointer-events: none;
    }
    #toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    /* ── Section headings ── */
    .section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 12px;
    }

    /* ── Sync row ── */
    .sync-row {
      display: flex;
      gap: 10px;
    }
    .sync-row .btn { flex: 1; }
  </style>
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header class="app-header">
      <span class="app-title">InterviewBlitz</span>
      <nav class="nav-tabs">
        <button class="nav-btn active" id="nav-home" onclick="App.showHome()">Home</button>
        <button class="nav-btn" id="nav-stats" onclick="App.showStats()">Stats</button>
      </nav>
    </header>

    <!-- Home Screen -->
    <section id="screen-home" class="screen active">
      <div id="home-overview" class="stat-grid">
        <div class="stat-box"><div class="stat-value" id="stat-due">—</div><div class="stat-label">Due Today</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-accuracy">—</div><div class="stat-label">Accuracy</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-reviewed">—</div><div class="stat-label">Reviewed</div></div>
        <div class="stat-box"><div class="stat-value" id="stat-streak">—</div><div class="stat-label">Best Streak</div></div>
      </div>

      <button class="btn btn-primary" id="btn-start" onclick="App.startQuiz()" style="margin-bottom:12px">
        Start Review
      </button>

      <div class="sync-row">
        <button class="btn btn-secondary" onclick="App.syncProblems()">Sync LeetCode</button>
        <button class="btn btn-secondary" onclick="App.showStats()">View Stats</button>
      </div>
    </section>

    <!-- Quiz Screen -->
    <section id="screen-quiz" class="screen">
      <!-- Loading state -->
      <div id="quiz-loading" class="spinner-wrap" style="display:none">
        <div class="spinner"></div>
        <div class="spinner-text" id="quiz-loading-text">Loading next problem…</div>
      </div>

      <!-- All caught up state -->
      <div id="quiz-caught-up" style="display:none">
        <div class="card" style="text-align:center;padding:40px 20px">
          <div style="font-size:2.5rem;margin-bottom:12px">🎉</div>
          <div style="font-size:1.2rem;font-weight:700;margin-bottom:8px">All caught up!</div>
          <div style="color:var(--muted);font-size:0.9rem;margin-bottom:6px">No problems due right now.</div>
          <div id="next-review-msg" style="color:var(--accent);font-size:0.85rem;margin-bottom:24px"></div>
          <button class="btn btn-secondary" onclick="App.showHome()">Back to Home</button>
        </div>
      </div>

      <!-- Active quiz -->
      <div id="quiz-active" style="display:none">
        <!-- Problem header -->
        <div class="problem-header card">
          <div class="problem-number" id="q-topic"></div>
          <div class="problem-title" id="q-title"></div>
          <span class="difficulty-badge" id="q-difficulty"></span>
        </div>

        <!-- Progress -->
        <div class="quiz-progress">
          <span class="progress-label" id="q-progress-text">1 / 4</span>
          <div class="progress-bar"><div class="progress-fill" id="q-progress-bar" style="width:25%"></div></div>
          <a id="q-leetcode-link" href="#" target="_blank" rel="noopener"
             style="font-size:0.78rem;color:var(--muted);text-decoration:none;white-space:nowrap">LC ↗</a>
        </div>

        <!-- Question card -->
        <div class="card">
          <div class="question-type" id="q-type"></div>
          <div class="question-text" id="q-text"></div>
          <div class="options-list" id="q-options"></div>
          <div class="explanation-box" id="q-explanation" style="display:none">
            <strong>Explanation</strong>
            <span id="q-explanation-text"></span>
          </div>
        </div>

        <button class="btn btn-primary" id="btn-next-q" onclick="App.nextQuestion()" style="display:none">
          Next Question
        </button>
      </div>

      <!-- Summary state -->
      <div id="quiz-summary" style="display:none">
        <div class="card">
          <div style="text-align:center;padding:8px 0 4px">
            <div style="font-size:0.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:8px">Problem Complete</div>
            <div class="problem-title" id="summary-title" style="font-size:1.1rem;margin-bottom:12px"></div>
            <div class="summary-score" id="summary-score"></div>
            <div class="summary-label" id="summary-label"></div>
            <a id="summary-leetcode-link" href="#" target="_blank" rel="noopener" class="leetcode-link">
              View on LeetCode ↗
            </a>
          </div>
        </div>
        <button class="btn btn-primary" id="btn-next-problem" onclick="App.loadNextProblem()" style="margin-bottom:12px">
          Next Problem
        </button>
        <button class="btn btn-secondary" onclick="App.showHome()">Back to Home</button>
      </div>
    </section>

    <!-- Stats Screen -->
    <section id="screen-stats" class="screen">
      <div class="card" style="margin-bottom:16px">
        <div class="section-title">Weak Areas</div>
        <div id="weak-areas-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
      </div>
      <div class="card">
        <div class="section-title">All Topics</div>
        <div id="topics-list"><div class="spinner-wrap"><div class="spinner"></div></div></div>
      </div>
    </section>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="/app.js"></script>
</body>
</html>
